    header{position:sticky;top:0;z-index:100;background:#161b22;border-bottom:1px solid #30363d;padding:12px 16px}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .header-title{font-size:17px;font-weight:700;color:#58a6ff}
    .header-actions{display:flex;gap:6px;align-items:center}
    .btn{padding:6px 12px;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#e6edf3;cursor:pointer;font-size:13px;transition:all .2s}
    .btn:hover{background:#30363d}
    .btn.primary{background:#1f6feb;border-color:#1f6feb}
    .btn.primary:hover{background:#388bfd}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .search-bar{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:14px;margin-bottom:8px}
    .search-bar:focus{outline:none;border-color:#58a6ff}
    .overall-progress{display:flex;align-items:center;gap:10px}
    .progress-bar{flex:1;height:6px;background:#21262d;border-radius:3px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#1f6feb,#58a6ff);border-radius:3px;transition:width .4s ease}
    .progress-text{font-size:12px;color:#8b949e;white-space:nowrap}
    main{padding:16px;max-width:800px;margin:0 auto}
    .unit-card{background:#161b22;border:1px solid #30363d;border-radius:10px;margin-bottom:14px;overflow:hidden}
    .unit-header{padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
    .unit-header:hover{background:#1c2128}
    .unit-header-left{display:flex;align-items:center;gap:10px}
    .unit-icon{font-size:18px}
    .unit-title{font-size:14px;font-weight:600;line-height:1.3}
    .unit-meta{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:8px}
    .unit-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#21262d;color:#8b949e;white-space:nowrap}
    .unit-badge.complete{background:#1a4731;color:#56d364}
    .unit-badge.inprogress{background:#1c2a3a;color:#58a6ff}
    .chevron{color:#8b949e;transition:transform .2s;font-size:11px;margin-left:4px}
    .unit-card.expanded .chevron{transform:rotate(90deg)}
    .unit-pb{height:3px;background:#21262d}
    .unit-pf{height:100%;background:linear-gradient(90deg,#1f6feb,#56d364);transition:width .4s ease}
    .unit-body{display:none}
    .unit-card.expanded .unit-body{display:block}
    .section{border-top:1px solid #21262d}
    .section-header{padding:9px 16px;font-size:12px;font-weight:600;color:#8b949e;background:#0d1117;display:flex;align-items:center;justify-content:space-between}
    .section-check-all{font-size:11px;color:#58a6ff;cursor:pointer;padding:2px 6px;border-radius:4px;border:1px solid #1f6feb;background:transparent}
    .section-check-all:hover{background:#1c2a3a}
    .topics-list{}
    .topic-item{display:flex;align-items:center;gap:10px;padding:9px 16px 9px 20px;border-bottom:1px solid #0d1117;cursor:pointer;transition:background .1s}
    .topic-item:last-child{border-bottom:none}
    .topic-item:hover{background:#1c2128}
    .topic-item.hidden{display:none}
    .topic-cb{width:17px;height:17px;border:2px solid #30363d;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .topic-item.done .topic-cb{background:#238636;border-color:#238636}
    .ck{color:white;font-size:10px;display:none;font-weight:700}
    .topic-item.done .ck{display:block}
    .topic-name{font-size:13px;color:#c9d1d9;line-height:1.4}
    .topic-item.done .topic-name{color:#484f58;text-decoration:line-through}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:22px;width:90%;max-width:400px}
    .modal h2{font-size:15px;margin-bottom:14px;color:#e6edf3}
    .modal label{display:block;font-size:12px;color:#8b949e;margin-bottom:5px;margin-top:12px}
    .modal input{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:14px}
    .modal input:focus{outline:none;border-color:#58a6ff}
    .modal-hint{font-size:11px;color:#8b949e;margin-top:8px;line-height:1.5}
    .modal-hint code{background:#0d1117;padding:2px 5px;border-radius:3px;color:#79c0ff}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#161b22;border:1px solid #30363d;color:#e6edf3;padding:10px 18px;border-radius:8px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
    .toast.show{opacity:1}
    .toast.ok{border-color:#238636;color:#56d364}
    .toast.err{border-color:#da3633;color:#f85149}
    .section-count{color:#484f58;font-weight:400}
    @media(max-width:600px){.unit-title{font-size:13px}main{padding:10px}.header-title{font-size:15px}}
  </style>
</head>
<body>

<header>

    <div class="header-title">📚 NET CS Tracker</div>
    <div class="header-actions">
      <button class="btn" id="sync-btn" onclick="syncNow()">🔄 Sync</button>
      <button class="btn" onclick="openSettings()">⚙️</button>
    </div>
  </div>
  <input type="text" class="search-bar" placeholder="🔍 Search topics..." oninput="filterTopics(this.value)">
  <div class="overall-progress">
    <div class="progress-bar"><div class="progress-fill" id="overall-fill" style="width:0%"></div></div>
    <span class="progress-text" id="overall-text">0 / 0 (0%)</span>
  </div>
</header>

<main id="app"></main>

<div class="modal-overlay" id="settings-modal" onclick="maybeClose(event)">
  <div class="modal">
    <h2>⚙️ Sync Settings</h2>
    <label>Server IP : Port (same WiFi)</label>
    <input type="text" id="server-ip" placeholder="192.168.1.100:3000">
    <div class="modal-hint">
      1. Run <code>node server.js</code> on your laptop<br>
      2. It will print the IP address to use<br>
      3. Paste it here — data merges as union<br>
      4. Both devices must be on same WiFi
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeSettings()">Cancel</button>
      <button class="btn primary" onclick="saveSettings()">Save & Sync</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ================================================================
// STATE
// ================================================================
let completed = new Set(JSON.parse(localStorage.getItem('net_completed')||'[]'));
let serverIP  = localStorage.getItem('net_server_ip')||'';

// ================================================================
// RENDER
// ================================================================
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  SYLLABUS.forEach(unit=>{
    const allT=unit.sections.flatMap(s=>s.topics);
    const done=allT.filter(t=>completed.has(t.id)).length;
    const total=allT.length;
    const pct=total?Math.round(done/total*100):0;
    const bc=pct===100?'complete':pct>0?'inprogress':'';
    const bt=pct===100?'✓ Done':`${done}/${total}`;
    const card=document.createElement('div');
    card.className='unit-card';
    card.id=`unit-${unit.id}`;
    card.innerHTML=`
      <div class="unit-header" onclick="toggleUnit('${unit.id}')">
        <div class="unit-header-left">
          <span class="unit-icon">${unit.icon}</span>
          <span class="unit-title">${unit.title}</span>
        </div>
        <div class="unit-meta">
          <span class="unit-badge ${bc}">${bt}</span>
          <span class="chevron">▶</span>
        </div>
      </div>
      <div class="unit-pb"><div class="unit-pf" id="upf-${unit.id}" style="width:${pct}%"></div></div>
      <div class="unit-body" id="body-${unit.id}">
        ${unit.sections.map(s=>renderSection(s)).join('')}
      </div>`;
    app.appendChild(card);
  });
  updateOverall();
}

function renderSection(s){
  const done=s.topics.filter(t=>completed.has(t.id)).length;
  const total=s.topics.length;
  const allDone=done===total;
  return `<div class="section" id="sec-${s.id}">
    <div class="section-header">
      <span>${s.title} <span class="section-count" id="sc-${s.id}">(${done}/${total})</span></span>
      <button class="section-check-all" id="sca-${s.id}" onclick="toggleSection('${s.id}',event)">${allDone?'Uncheck all':'Check all'}</button>
    </div>
    <div class="topics-list">${s.topics.map(t=>renderTopic(t)).join('')}</div>
  </div>`;
}

function renderTopic(t){
  const done=completed.has(t.id);
  return `<div class="topic-item${done?' done':''}" id="ti-${t.id}" onclick="toggleTopic('${t.id}')">
    <div class="topic-cb"><span class="ck">✓</span></div>
    <span class="topic-name">${t.name}</span>
  </div>`;
}

// ================================================================
// TOGGLE ACTIONS
// ================================================================
function toggleUnit(uid){
  document.getElementById(`unit-${uid}`).classList.toggle('expanded');
}

function toggleTopic(tid){
  completed.has(tid)?completed.delete(tid):completed.add(tid);
  const el=document.getElementById(`ti-${tid}`);
  el.classList.toggle('done',completed.has(tid));
  saveLocal();
  // find parent section and update counts
  const sec=SYLLABUS.flatMap(u=>u.sections).find(s=>s.topics.some(t=>t.id===tid));
  if(sec) updateSectionUI(sec);
  const unit=SYLLABUS.find(u=>u.sections.some(s=>s.id===sec?.id));
  if(unit) updateUnitUI(unit);
  updateOverall();
}

function toggleSection(sid,e){
  e.stopPropagation();
  const sec=SYLLABUS.flatMap(u=>u.sections).find(s=>s.id===sid);
  if(!sec)return;
  const allDone=sec.topics.every(t=>completed.has(t.id));
  sec.topics.forEach(t=>{
    allDone?completed.delete(t.id):completed.add(t.id);
    const el=document.getElementById(`ti-${t.id}`);
    if(el)el.classList.toggle('done',completed.has(t.id));
  });
  saveLocal();
  updateSectionUI(sec);
  const unit=SYLLABUS.find(u=>u.sections.some(s=>s.id===sid));
  if(unit)updateUnitUI(unit);
  updateOverall();
}

function updateSectionUI(sec){
  const done=sec.topics.filter(t=>completed.has(t.id)).length;
  const total=sec.topics.length;
  const sc=document.getElementById(`sc-${sec.id}`);
  if(sc)sc.textContent=`(${done}/${total})`;
  const sca=document.getElementById(`sca-${sec.id}`);
  if(sca)sca.textContent=done===total?'Uncheck all':'Check all';
}

function updateUnitUI(unit){
  const allT=unit.sections.flatMap(s=>s.topics);
  const done=allT.filter(t=>completed.has(t.id)).length;
  const total=allT.length;
  const pct=total?Math.round(done/total*100):0;
  const pf=document.getElementById(`upf-${unit.id}`);
  if(pf)pf.style.width=`${pct}%`;
  const badge=document.querySelector(`#unit-${unit.id} .unit-badge`);
  if(badge){
    badge.textContent=pct===100?'✓ Done':`${done}/${total}`;
    badge.className=`unit-badge${pct===100?' complete':pct>0?' inprogress':''}`;
  }
}

function updateOverall(){
  const allT=SYLLABUS.flatMap(u=>u.sections.flatMap(s=>s.topics));
  const done=allT.filter(t=>completed.has(t.id)).length;
  const total=allT.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('overall-fill').style.width=`${pct}%`;
  document.getElementById('overall-text').textContent=`${done} / ${total} (${pct}%)`;
}

// ================================================================
// SEARCH
// ================================================================
function filterTopics(q){
  q=q.toLowerCase().trim();
  if(!q){
    document.querySelectorAll('.topic-item').forEach(el=>el.classList.remove('hidden'));
    document.querySelectorAll('.unit-card.expanded').forEach(c=>c.classList.remove('expanded'));
    return;
  }
  SYLLABUS.forEach(unit=>{
    let hit=false;
    unit.sections.forEach(sec=>{
      sec.topics.forEach(t=>{
        const el=document.getElementById(`ti-${t.id}`);
        if(!el)return;
        const m=t.name.toLowerCase().includes(q);
        el.classList.toggle('hidden',!m);
        if(m)hit=true;
      });
    });
    const card=document.getElementById(`unit-${unit.id}`);
    if(card)card.classList.toggle('expanded',hit);
  });
}

// ================================================================
// STORAGE
// ================================================================
function saveLocal(){
  localStorage.setItem('net_completed',JSON.stringify([...completed]));
}

// ================================================================
// SETTINGS
// ================================================================
function openSettings(){
  document.getElementById('server-ip').value=serverIP;
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings(){
  document.getElementById('settings-modal').classList.remove('open');
}
function maybeClose(e){
  if(e.target===document.getElementById('settings-modal'))closeSettings();
}
function saveSettings(){
  serverIP=document.getElementById('server-ip').value.trim();
  localStorage.setItem('net_server_ip',serverIP);
  closeSettings();
  if(serverIP)syncNow();
}

// ================================================================
// SYNC
// ================================================================
async function syncNow(){
  if(!serverIP){openSettings();return;}
  const btn=document.getElementById('sync-btn');
  btn.textContent='⏳ Syncing...';
  btn.disabled=true;
  try{
    const res=await fetch(`http://${serverIP}/sync`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({completed:[...completed]})
    });
    if(!res.ok)throw new Error('Server error');
    const data=await res.json();
    if(data.completed){
      data.completed.forEach(id=>completed.add(id));
      saveLocal();
      render();
    }
    showToast(`✅ Synced! ${data.completed.length} topics merged`,'ok');
  }catch(err){
    showToast(`❌ Sync failed. Check server IP: ${serverIP}`,'err');
  }finally{
    btn.textContent='🔄 Sync';
    btn.disabled=false;
  }
}

// ================================================================
// TOAST
// ================================================================
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className=`toast show ${type}`;
  setTimeout(()=>t.className='toast',3000);
}

// ================================================================
// INIT
// ================================================================
render();
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
